<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        (function() {
            var path = window.location.pathname;
            
            if (path === '/' || path === '/index.html') return;

            var segments = path.split('/').filter(Boolean);
            var pageName = segments[segments.length - 1];

            var cleanName = decodeURIComponent(pageName).replace(/\s+/g, '+');

            var newPath = '/pages/' + cleanName;

            if (!newPath.toLowerCase().endsWith('.html')) {
                newPath += '.html';
            }

            window.location.replace(newPath);
        })();
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #DBDBE1; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Redirect...</p>
    <noscript>Пожалуйста, включите JavaScript для автоматического перехода.</noscript>
</body>
</html>
